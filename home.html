<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payoo | Home</title>
    <link rel="shortcut icon" href="./assets/logo.png" alt="title-logo" />

    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- daisyUI + Tailwind-->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style>
      * {
        font-family: "Outfit", sans-serif;
      }
    </style>
  </head>
  <body class="min-h-screen max-w-md mx-auto">
    <header class="border-b border-gray-300">
        <section class="w-11/12 mx-auto py-3 flex justify-between items-center">
            <div class="left flex gap-2">
                <div class="w-[60px]">
                    <img src="./assets/logo.png" alt="page-logo">
                </div>
                <div>
                    <p class="text-neutral text-lg font-extrabold mb-[6px]">$<span>45000</span></p>
                    <p class="text-neutral/50 text-sm">Available Balance</p>
                </div>
            </div>
            <div class="right">
                <a href="./index.html"><button class="btn text-neutral/50 text-sm font-normal rounded-lg">Log Out  <i class="fa-solid fa-arrow-right-from-bracket"></i></button></a>
            </div>
        </section>
    </header>

    <section class="w-11/12 mx-auto mt-8">
        <div class="mb-7">
            <p class="text-2xl font-bold text-neutral">Welcome to Pay<span class="text-primary">oo</span></p>
            <p class="text-base text-neutral/50 mt-4">Enjoy easy and convenient financial services with us. Cashout charge is low and</p>
        </div>
        <div class="grid grid-cols-3 gap-4">
            <button class="btn flex flex-col h-full py-5 px-6 rounded-2xl btn-primary btn-soft">
                <img src="./assets/opt-1.png" alt="option-1 image">
                <p>Add Money</p>
            </button>
            <button class="btn flex flex-col h-full py-5 px-6 rounded-2xl btn-primary btn-soft">
                <img src="./assets/opt-2.png" alt="option-2 image">
                <p>Cashout</p>
            </button>
            <button class="btn flex flex-col h-full py-5 px-6 rounded-2xl btn-primary btn-soft">
                <img src="./assets/opt-3.png" alt="option-3 image">
                <p class="whitespace-nowrap">Send Money</p>
            </button>
            <button class="btn flex flex-col h-full py-5 px-6 rounded-2xl btn-primary btn-soft">
                <img src="./assets/opt-4.png" alt="option-4 image">
                <p>Get Bonus</p>
            </button>
            <button class="btn flex flex-col h-full py-5 px-6 rounded-2xl btn-primary btn-soft">
                <img src="./assets/opt-5.png" alt="option-5 image">
                <p>Pay Bill</p>
            </button>
            <button class="btn flex flex-col h-full py-5 px-6 rounded-2xl btn-primary btn-soft">
                <img src="./assets/opt-6.png" alt="option-6 image">
                <p>Transactions</p>
            </button>
        </div>
    </section>
  </body>
</html>
